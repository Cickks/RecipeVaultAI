name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    name: Typecheck, tests, and Expo dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Check Expo dependency versions
        run: npx expo install --check
